tick_ms: 1000

services:
  market_ws:
    enabled: true
    auto_restart: true
    restart_backoff_ms: 1500
    cmd: ["python", "scripts/run_ws_ticker_feed_safe.py", "run"]

  ops_risk_gate:
    enabled: true
    auto_restart: true
    restart_backoff_ms: 1500
    cmd: ["python", "scripts/run_ops_risk_gate_service.py", "run"]

  ops_signal_adapter:
    enabled: true
    auto_restart: true
    restart_backoff_ms: 1500
    cmd: ["python", "scripts/run_ops_signal_adapter.py", "run"]

  # Bot runner placeholder:
  # Enable once your live runner entrypoint is stable.
  bot_runner:
    enabled: false
    auto_restart: true
    restart_backoff_ms: 2000
    cmd: ["python", "scripts/run_bot_runner.py"]
