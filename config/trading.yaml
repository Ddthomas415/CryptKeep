mode: paper   # paper | live (paper is the default; live-capable surfaces exist, but live readiness is not yet established)
run_id: paper_run

paths:
  journal_db: data/paper_journal.sqlite
  market_db: data/market_data.sqlite
  state_file: data/runner_state.json
  kill_switch_file: data/KILL_SWITCH.flag

market_data:
  # If true, runner starts CCXT price feeds itself (otherwise assumes you run run_price_feeds.*)
  auto_start_feeds: true
  config_path: config/market_data.yaml

aggregation:
  # mirror of market_data.yaml aggregation; runner uses it for MTM
  mode: median
  stale_seconds: 10
  primary_exchange_by_symbol:
    BTC/USDT: binance
    ETH/USDT: binance

symbols:
  - BTC/USDT
  - ETH/USDT

strategy:
  type: ema_crossover
  ema:
    fast: 12
    slow: 26
    min_history: 30
    trade_qty: 0.01

risk:
  max_trades_per_day: 10
  max_position_notional: 2000.0
  max_drawdown_frac: 0.10
  min_cash: 0.0

runner:
  tick_interval_sec: 2.0

execution_safety:
  enabled: true
  # Fail-closed in live mode: require fresh WS market data before sending orders
  require_ws_fresh_for_live: true
  # Freshness threshold (how old the last WS message is)
  max_ws_recv_age_ms: 1500

  # Latency threshold (submit->ack); used for monitoring + optional pauses
  max_ack_ms: 3000

  # If a safety gate trips, pause trading for N seconds
  pause_seconds_on_breach: 30

  # Where latency events are stored (same DB used by WS collector)
  latency_db_path: data/market_ws.sqlite

# reconciliation.quote_ccys can list additional quote currencies to report (informational).
# Primary enforcement/sync uses portfolio.quote_ccy only.
reconciliation_quote_note: true

packaging:
  app_name: CryptoBotPro
  default_host: "127.0.0.1"
  default_port: 8501

first_run:
  # If config files are missing, use the First-Run Wizard → Restore Missing Configs.
  enabled: true

risk:
  live:
    # Per-symbol cooldown (set in .env):
    #   CBP_SYMBOL_LOSS_LIMIT=3      consecutive losses before locking
    #   CBP_SYMBOL_LOCK_MINUTES=60   lock duration in minutes
    # Per-symbol cooldown (controlled via env vars):
    #   CBP_SYMBOL_LOSS_LIMIT=3      consecutive losses before locking a symbol
    #   CBP_SYMBOL_LOCK_MINUTES=60   lock duration in minutes
    # HARD gates enforced before any live submit
    max_daily_loss_usd: 25
    max_notional_per_trade_usd: 25
    max_trades_per_day: 5
    max_position_notional_usd: 50
paths:
  kill_switch_file: "data/KILL_SWITCH.flag"
