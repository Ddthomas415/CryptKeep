services:
  postgres:
    image: postgres:16
    container_name: cta-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: trading_ai
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cta-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  vector:
    image: qdrant/qdrant:latest
    container_name: cta-vector
    ports:
      - "${VECTOR_HOST_PORT:-6333}:6333"

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    container_name: cta-backend
    env_file:
      - .env.example
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - ./scripts:/app/scripts
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    container_name: cta-frontend
    command: sh -lc "pnpm install && pnpm dev --host 0.0.0.0 --port 3000"
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app/frontend
      - ./shared:/app/shared
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
