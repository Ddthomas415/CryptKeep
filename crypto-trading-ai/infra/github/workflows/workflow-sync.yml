name: workflow-sync

on:
  push:
    paths:
      - ".github/workflows/**"
      - "infra/github/workflows/**"
      - "scripts/sync_github_workflows.sh"
      - "scripts/check_github_workflows_sync.sh"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "infra/github/workflows/**"
      - "scripts/sync_github_workflows.sh"
      - "scripts/check_github_workflows_sync.sh"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify workflow sync
        run: bash scripts/check_github_workflows_sync.sh
