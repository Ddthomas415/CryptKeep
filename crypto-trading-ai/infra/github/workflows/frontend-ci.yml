name: frontend-ci

on:
  push:
    paths:
      - "frontend/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/frontend-ci.yml"
      - "infra/github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/frontend-ci.yml"
      - "infra/github/workflows/frontend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install

      - name: Lint
        run: |
          cd frontend
          pnpm lint

      - name: Test
        run: |
          cd frontend
          pnpm test --run

      - name: Build
        run: |
          cd frontend
          pnpm build
