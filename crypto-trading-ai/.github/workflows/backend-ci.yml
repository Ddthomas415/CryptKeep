name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - "shared/openapi/**"
      - "shared/schemas/**"
      - "shared/mock-data/**"
      - "scripts/check_openapi_sync.py"
      - "scripts/generate_shared_openapi.py"
      - "scripts/generate_shared_schemas.py"
      - "scripts/validate_shared_mock_data.py"
      - "scripts/check_github_workflows_sync.sh"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"
      - "infra/github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "shared/openapi/**"
      - "shared/schemas/**"
      - "shared/mock-data/**"
      - "scripts/check_openapi_sync.py"
      - "scripts/generate_shared_openapi.py"
      - "scripts/generate_shared_schemas.py"
      - "scripts/validate_shared_mock_data.py"
      - "scripts/check_github_workflows_sync.sh"
      - "pyproject.toml"
      - ".github/workflows/backend-ci.yml"
      - "infra/github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn[standard] sqlalchemy alembic psycopg[binary] \
            pydantic pydantic-settings python-dotenv redis pytest ruff mypy httpx

      - name: Lint
        run: |
          ruff check backend

      - name: Verify workflow sync
        run: |
          bash scripts/check_github_workflows_sync.sh

      - name: Check shared schemas
        run: |
          python scripts/generate_shared_schemas.py --check

      - name: Validate shared mock data
        run: |
          python scripts/validate_shared_mock_data.py

      - name: Check shared OpenAPI generation
        run: |
          python scripts/generate_shared_openapi.py --check

      - name: Check OpenAPI/route contracts
        run: |
          python scripts/check_openapi_sync.py

      - name: Run tests
        run: |
          pytest backend/tests
