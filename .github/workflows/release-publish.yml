name: Release Publisher (tagged)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). If empty on dispatch, uses current ref."
        required: false
        default: ""
      build_pyinstaller:
        description: "Build PyInstaller wrapper"
        required: true
        default: "true"
      build_briefcase:
        description: "Build Briefcase package"
        required: true
        default: "false"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_windows:
    name: Windows build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f requirements/base.txt ]; then
            python -m pip install -r requirements/base.txt
          fi
          python -m pip install -r requirements/desktop.txt

      - name: Build (PyInstaller optional)
        if: ${{ github.event_name == 'push' || inputs.build_pyinstaller == 'true' }}
        shell: bash
        run: |
          python scripts/release_checklist.py --sync-requires --pyinstaller

      - name: Sign dist/ (optional; secrets required)
        if: ${{ secrets.WIN_CERTIFICATE_BASE64 != '' && secrets.WIN_CERT_PASSWORD != '' && (secrets.WIN_CERT_SHA1 != '' || secrets.WIN_CERT_NAME != '') }}
        uses: skymatic/code-sign-action@v3.0.1
        with:
          certificate: ${{ secrets.WIN_CERTIFICATE_BASE64 }}
          password: ${{ secrets.WIN_CERT_PASSWORD }}
          certificatesha1: ${{ secrets.WIN_CERT_SHA1 }}
          certificatename: ${{ secrets.WIN_CERT_NAME }}
          description: "CryptoBotPro"
          timestampUrl: "http://timestamp.digicert.com"
          folder: "dist"
          recursive: true

      - name: Verify signatures (if signed)
        if: ${{ secrets.WIN_CERTIFICATE_BASE64 != '' && secrets.WIN_CERT_PASSWORD != '' && (secrets.WIN_CERT_SHA1 != '' || secrets.WIN_CERT_NAME != '') }}
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -Path "dist" -Recurse -File | Where-Object { $_.Name.ToLower().EndsWith(".exe") -or $_.Name.ToLower().EndsWith(".msi") }
          if (-not $files) { throw "No .exe/.msi found under dist/ to verify" }
          foreach ($f in $files) { signtool verify /pa /v "$($f.FullName)" }

      - name: Write FINAL manifest (post-sign)
        shell: bash
        run: |
          python scripts/release_checklist.py

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/**
            releases/release_manifest_*.json
          if-no-files-found: warn

  build_macos:
    name: macOS build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide build mode
        id: decide
        shell: bash
        run: |
          echo "build_pyinstaller=${{ github.event_name == 'push' || inputs.build_pyinstaller == 'true' }}" >> $GITHUB_OUTPUT
          echo "build_briefcase=${{ github.event_name != 'push' && inputs.build_briefcase == 'true' }}" >> $GITHUB_OUTPUT

      - name: Install deps (PyInstaller path)
        if: ${{ steps.decide.outputs.build_pyinstaller == 'true' }}
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f requirements/base.txt ]; then
            python -m pip install -r requirements/base.txt
          fi
          python -m pip install -r requirements/desktop.txt

      - name: Build (PyInstaller)
        if: ${{ steps.decide.outputs.build_pyinstaller == 'true' }}
        shell: bash
        run: |
          python scripts/release_checklist.py --sync-requires --pyinstaller

      - name: Install deps (Briefcase path)
        if: ${{ steps.decide.outputs.build_briefcase == 'true' }}
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -r requirements/briefcase.txt
          python scripts/sync_briefcase_requires.py

      - name: Briefcase package (DMG)
        if: ${{ steps.decide.outputs.build_briefcase == 'true' }}
        shell: bash
        run: |
          briefcase create macOS
          briefcase build macOS
          briefcase package macOS

      - name: Import signing certificate (p12) into temporary keychain
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' && secrets.MAC_CERT_PASSWORD != '' && secrets.MAC_KEYCHAIN_PASSWORD != '' }}
        shell: bash
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
        run: |
          bash packaging/signing/macos_ci_import_cert.sh \
            --p12-base64 "$MAC_CERT_P12_BASE64" \
            --p12-password "$MAC_CERT_PASSWORD" \
            --keychain-password "$MAC_KEYCHAIN_PASSWORD"

      - name: CodeSign .app bundles (if identity provided)
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' && secrets.MAC_CERT_PASSWORD != '' && secrets.MAC_KEYCHAIN_PASSWORD != '' && secrets.MAC_SIGN_IDENTITY != '' }}
        shell: bash
        env:
          MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
        run: |
          bash packaging/signing/macos_ci_codesign_apps.sh --identity "$MAC_SIGN_IDENTITY"

      - name: Create notarytool keychain profile
        if: ${{ secrets.MAC_APPLE_ID != '' && secrets.MAC_APP_PASSWORD != '' && secrets.MAC_TEAM_ID != '' }}
        shell: bash
        env:
          APPLE_ID: ${{ secrets.MAC_APPLE_ID }}
          APP_PASSWORD: ${{ secrets.MAC_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.MAC_TEAM_ID }}
        run: |
          bash packaging/signing/macos_ci_prepare_notary_profile.sh \
            --profile "NotaryProfile" \
            --apple-id "$APPLE_ID" \
            --password "$APP_PASSWORD" \
            --team-id "$TEAM_ID"

      - name: Notarize + staple DMG(s) (if creds present)
        if: ${{ secrets.MAC_APPLE_ID != '' && secrets.MAC_APP_PASSWORD != '' && secrets.MAC_TEAM_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          DMGS=$(ls dist/*.dmg 2>/dev/null || true)
          if [ -z "${DMGS}" ]; then DMGS=$(find build -name "*.dmg" -maxdepth 6 2>/dev/null || true); fi
          if [ -z "${DMGS}" ]; then echo "No DMG found to notarize."; exit 2; fi
          for f in $DMGS; do bash packaging/signing/macos_notarize_file.sh --file "$f" --profile "NotaryProfile"; done

      - name: Verify stapler + spctl assess (if notarized)
        if: ${{ secrets.MAC_APPLE_ID != '' && secrets.MAC_APP_PASSWORD != '' && secrets.MAC_TEAM_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          DMGS=$(ls dist/*.dmg 2>/dev/null || true)
          if [ -z "${DMGS}" ]; then DMGS=$(find build -name "*.dmg" -maxdepth 6 2>/dev/null || true); fi
          for f in $DMGS; do xcrun stapler validate -v "$f"; done
          APPS=$( (ls dist/*.app 2>/dev/null || true) ; (find build -maxdepth 7 -name "*.app" -type d 2>/dev/null || true) )
          if [ -n "${APPS}" ]; then for app in $APPS; do spctl --assess --type execute --verbose=2 "$app"; done; fi

      - name: Write FINAL manifest (post-sign/notary)
        shell: bash
        run: |
          python scripts/release_checklist.py

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dist/**
            build/**
            releases/release_manifest_*.json
          if-no-files-found: warn

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build_windows, build_macos]

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts (Windows)
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release_artifacts/windows

      - name: Download artifacts (macOS)
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release_artifacts/macos

      - name: Setup Python (notes generator)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Release Notes (CHANGELOG + manifests)
        shell: bash
        run: |
          set -euo pipefail
          # Find manifests inside downloaded artifacts
          MANIFESTS=$(find release_artifacts -name "release_manifest_*.json" -type f | tr '\n' ',' | sed 's/,$//')
          if [ -z "${MANIFESTS}" ]; then
            # fallback to repo local (should exist in some cases)
            MANIFESTS="releases/release_manifest_*.json"
          fi
          python scripts/generate_release_notes.py \
            --tag "${{ steps.tag.outputs.tag }}" \
            --manifest-glob "${MANIFESTS}" \
            --out releases/RELEASE_NOTES.md

      - name: Create / Update Release and upload files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          body_path: releases/RELEASE_NOTES.md
          files: |
            release_artifacts/**/*
            releases/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
