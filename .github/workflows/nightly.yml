name: Nightly Build (Artifacts Only)

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Nightly Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS (.app)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          chmod +x scripts/build_desktop_mac.sh
          BUILD_APP=1 bash scripts/build_desktop_mac.sh
          ditto -c -k --sequesterRsrc --keepParent dist/CryptoBotPro.app CryptoBotPro-macOS.app.zip

      - name: Build Windows (console + quiet)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $env:BUILD_WINDOWED="0"
          powershell -ExecutionPolicy Bypass -File scripts/build_desktop_windows.ps1
          Copy-Item -Force dist\CryptoBotPro.exe CryptoBotPro-Windows-console.exe

          $env:BUILD_WINDOWED="1"
          powershell -ExecutionPolicy Bypass -File scripts/build_desktop_windows.ps1
          Copy-Item -Force dist\CryptoBotPro.exe CryptoBotPro-Windows-quiet.exe

          Compress-Archive -Force CryptoBotPro-Windows-console.exe CryptoBotPro-Windows-console.zip
          Compress-Archive -Force CryptoBotPro-Windows-quiet.exe CryptoBotPro-Windows-quiet.zip

      - name: Upload artifacts (nightly)
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.os }}
          path: |
            CryptoBotPro-macOS.app.zip
            CryptoBotPro-Windows-console.zip
            CryptoBotPro-Windows-quiet.zip
          if-no-files-found: error
