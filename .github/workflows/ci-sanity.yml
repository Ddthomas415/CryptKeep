name: CI - Sanity (ruff + mypy + tests + config)

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  sanity:
    name: CI sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify PR change scope
        id: scope
        shell: bash
        run: |
          docs_only=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            changed="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
            docs_only=true
            if [ -z "$changed" ]; then
              docs_only=false
            fi
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              case "$path" in
                docs/*|*.md|README*|CHANGELOG*|LICENSE*|NOTICE*) ;;
                *) docs_only=false ;;
              esac
            done <<EOF
          $changed
          EOF
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          printf 'docs_only=%s\n' "$docs_only"

      - name: Docs-only fast pass
        if: steps.scope.outputs.docs_only == 'true'
        run: echo "Docs-only PR; skipping heavyweight sanity gates."

      - name: Setup Python
        if: steps.scope.outputs.docs_only != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        if: steps.scope.outputs.docs_only != 'true'
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f requirements/base.txt ]; then
            python -m pip install -r requirements/base.txt
          fi

      - name: Install dev deps
        if: steps.scope.outputs.docs_only != 'true'
        shell: bash
        run: |
          python -m pip install -r requirements/dev.txt

      - name: Run sanity suite
        if: steps.scope.outputs.docs_only != 'true'
        shell: bash
        run: |
          python scripts/pre_release_sanity.py

      - name: Run Phase 1 safety pack
        if: steps.scope.outputs.docs_only != 'true'
        shell: bash
        run: |
          make phase1-safety
