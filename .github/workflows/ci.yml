name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Install dev deps
        run: python -m pip install ruff mypy pytest

      - name: Validate (scripts/validate.py)
        run: python scripts/validate.py

      - name: Ruff lint
        run: python -m ruff check .

      - name: Mypy type check
        # Advisory until type coverage improves — failures are visible but non-blocking
        run: python -m mypy services/ core/ --ignore-missing-imports --no-error-summary || true

      - name: Pytest core suite
        run: |
          python -m pytest \
            tests/test_smoke.py \
            tests/test_risk_manager.py \
            tests/test_user_auth_store.py \
            tests/test_place_order_fail_closed.py \
            tests/test_place_order_ops_risk_gate.py \
            tests/test_reconciliation.py \
            tests/test_position_accounting.py \
            tests/test_watchdog_behavior.py \
            tests/test_system_guard.py \
            tests/test_paper_strategy_evidence_service.py \
            tests/test_paper_runner_lifecycle.py \
            tests/test_promotion_ladder.py \
            tests/test_strategy_runtime_runner.py \
            -v --tb=short -q

      - name: Governance smoke
        run: make test-governance
