name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: CI validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify PR change scope
        id: scope
        shell: bash
        run: |
          docs_only=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            changed="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
            docs_only=true
            if [ -z "$changed" ]; then
              docs_only=false
            fi
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              case "$path" in
                docs/*|*.md|README*|CHANGELOG*|LICENSE*|NOTICE*) ;;
                *) docs_only=false ;;
              esac
            done <<EOF
          $changed
          EOF
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          printf 'docs_only=%s\n' "$docs_only"

      - name: Docs-only fast pass
        if: steps.scope.outputs.docs_only == 'true'
        run: echo "Docs-only PR; skipping heavyweight validate/test/runtime gates."

      - name: Setup Python
        if: steps.scope.outputs.docs_only != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        if: steps.scope.outputs.docs_only != 'true'
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-pinned.txt

      - name: Install dev deps
        if: steps.scope.outputs.docs_only != 'true'
        run: python -m pip install ruff mypy pytest

      - name: Validate (scripts/validate.py)
        if: steps.scope.outputs.docs_only != 'true'
        run: python scripts/validate.py

      - name: Ruff lint
        if: steps.scope.outputs.docs_only != 'true'
        run: |
          python - <<'PY'
          import importlib.util
          import subprocess
          import sys

          if importlib.util.find_spec("ruff") is None:
              print("[INFO] ruff not installed; skipping broad ruff")
              raise SystemExit(0)

          targets = [
              "services/execution/intent_writer.py",
              "services/execution/intent_consumer.py",
              "services/execution/live_intent_consumer.py",
              "services/execution/held_intents.py",
          ]
          subprocess.run([sys.executable, "-m", "ruff", "check", *targets], check=True)
          PY

      - name: Ruff — enforce no bare excepts in critical paths
        if: steps.scope.outputs.docs_only != 'true'
        run: |
          python -m ruff check services/execution/held_intents.py --select E722,BLE001 --no-fix
          echo "No new bare excepts in scoped critical service paths"

      - name: Mypy type check
        if: steps.scope.outputs.docs_only != 'true'
        # Advisory until type coverage improves — failures are visible but non-blocking
        run: python -m mypy services/ core/ --ignore-missing-imports --no-error-summary || true

      - name: Pytest core suite
        if: steps.scope.outputs.docs_only != 'true'
        env:
          CBP_SKIP_SLOW: "1"
        run: |
          python -m pytest tests/ -q --tb=short

      - name: Paper runner dry-run
        if: steps.scope.outputs.docs_only != 'true'
        env:
          CBP_STATE_DIR: /tmp/cbp_ci_state
        run: python scripts/run_es_daily_trend_paper.py --dry-run

      - name: ManagedComponent API contract
        if: steps.scope.outputs.docs_only != 'true'
        run: |
          python - <<'PY'
          # Regression guard: verify paper runner uses correct ManagedComponent kwargs
          import ast, sys
          src = open("scripts/run_es_daily_trend_paper.py").read()
          assert "lock_dir=runtime_dir()" in src, "REGRESSION: lock_dir= missing, paper runner may use wrong ManagedComponent kwargs"
          assert "lock_file=" not in src or "lock_file=runtime_dir" not in src, "REGRESSION: lock_file= found, use lock_dir= instead"
          assert "stop_flag_file=" not in src, "REGRESSION: stop_flag_file= found, use flags_dir= instead"
          print("ManagedComponent API contract: OK")
          PY

      - name: paper-run-short (CI operational gate)
        if: steps.scope.outputs.docs_only != 'true'
        env:
          CBP_STATE_DIR: /tmp/cbp_ci_state
          CBP_PAPER_RUNTIME_SEC: "10"
        run: |
          # Kill any leftover processes, clear stale locks, run a 10s campaign
          python - <<'PY'
          import pathlib, os
          state = pathlib.Path("/tmp/cbp_ci_state")
          for d in ["runtime/locks", "runtime/flags", "runtime/snapshots"]:
              (state / d).mkdir(parents=True, exist_ok=True)
          PY
          timeout 60 python scripts/run_es_daily_trend_paper.py || true
          python - <<'PY'
          import pathlib, sys
          ev_dir = pathlib.Path("/tmp/cbp_ci_state/data/evidence/es_daily_trend_v1")
          if not ev_dir.exists():
              print("WARNING: evidence dir not created", file=sys.stderr)
              sys.exit(0)  # non-fatal in CI — exchange may be unreachable
          files = list(ev_dir.glob("*.jsonl"))
          print(f"Evidence files: {[f.name for f in files]}")
          session_files = [f for f in files if f.name.startswith("session_")]
          assert session_files, "No session evidence written — campaign did not complete"
          signal_files = [f for f in files if f.name.startswith("signal_")]
          order_files = [f for f in files if f.name.startswith("order_")]
          assert signal_files, "No signal evidence — signal pipeline broken"

          import json
          latest_signal = None
          latest_signal_file = sorted(signal_files)[-1]
          with open(latest_signal_file, "r", encoding="utf-8") as fh:
              for line in fh:
                  if line.strip():
                      latest_signal = json.loads(line)

          direction = None
          if latest_signal:
              direction = (
                  latest_signal.get("signal_direction")
                  or latest_signal.get("signal_action")
              )

          if direction in ("buy", "sell"):
              assert order_files, "No order evidence — actionable signal but order pipeline broken"
          else:
              print(f"No order evidence expected for signal: {direction} (OK)")
          print("paper-run-short: OK")
          PY

      - name: Governance smoke
        if: steps.scope.outputs.docs_only != 'true'
        run: make test-governance
