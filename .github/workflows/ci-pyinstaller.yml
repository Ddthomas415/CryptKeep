name: CI - PyInstaller Desktop Wrapper

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ "windows-latest", "macos-latest" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f requirements/base.txt ]; then
            python -m pip install -r requirements/base.txt
          fi
          python -m pip install -r requirements/desktop.txt

      - name: Run quick import smoke (no trading)
        shell: bash
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import streamlit; import ccxt; import webview; print('imports_ok')"

      - name: Build via release_checklist (pyinstaller)
        shell: bash
        run: |
          python scripts/release_checklist.py --sync-requires --pyinstaller

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CryptoBotPro-PyInstaller-${{ matrix.os }}
          path: |
            dist/**
            releases/release_manifest_*.json
          if-no-files-found: error
