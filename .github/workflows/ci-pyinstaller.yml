name: CI - PyInstaller Desktop Wrapper

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ "windows-latest", "macos-latest" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify PR change scope
        id: scope
        shell: bash
        run: |
          docs_only=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            changed="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
            docs_only=true
            if [ -z "$changed" ]; then
              docs_only=false
            fi
            while IFS= read -r path; do
              [ -z "$path" ] && continue
              case "$path" in
                docs/*|*.md|README*|CHANGELOG*|LICENSE*|NOTICE*) ;;
                *) docs_only=false ;;
              esac
            done <<EOF
          $changed
          EOF
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          printf 'docs_only=%s\n' "$docs_only"

      - name: Docs-only fast pass
        if: steps.scope.outputs.docs_only == 'true'
        run: echo "Docs-only PR; skipping desktop wrapper build."

      - name: Setup Python
        if: steps.scope.outputs.docs_only != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        if: steps.scope.outputs.docs_only != 'true'
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f requirements/base.txt ]; then
            python -m pip install -r requirements/base.txt
          fi
          python -m pip install -r requirements/desktop.txt

      - name: Run quick import smoke (no trading)
        if: steps.scope.outputs.docs_only != 'true'
        shell: bash
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import streamlit; import ccxt; import webview; print('imports_ok')"

      - name: Build via release_checklist (pyinstaller)
        if: steps.scope.outputs.docs_only != 'true'
        shell: bash
        run: |
          python scripts/release_checklist.py --sync-requires --pyinstaller

      - name: Upload dist artifacts
        if: steps.scope.outputs.docs_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: CryptoBotPro-PyInstaller-${{ matrix.os }}
          path: |
            dist/**
            releases/release_manifest_*.json
          if-no-files-found: error
