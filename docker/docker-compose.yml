services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cbp-backend
    working_dir: /app/phase1_research_copilot
    env_file:
      - ../.env.docker
    environment:
      - PYTHONPATH=/app/phase1_research_copilot:/app
      - CBP_REPO_ROOT=/app
      - CBP_DB_PATH=/app/data/state.sqlite
      - CBP_LOG_DIR=/app/logs
      - CBP_SAFE_OUTPUT_ROOT=/app/build
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../build:/app/build
      - ..:/app
    ports:
      - "9000:9000"
    command: ["python", "-m", "uvicorn", "gateway.main:app", "--host", "0.0.0.0", "--port", "9000"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cbp-dashboard
    working_dir: /app
    env_file:
      - ../.env.docker
    environment:
      - PYTHONPATH=/app
      - CBP_REPO_ROOT=/app
      - CBP_DB_PATH=/app/data/state.sqlite
      - CBP_LOG_DIR=/app/logs
      - CBP_SAFE_OUTPUT_ROOT=/app/build
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - BACKEND_URL=http://backend:9000
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../build:/app/build
      - ..:/app
    ports:
      - "18501:8501"
    depends_on:
      backend:
        condition: service_healthy
    command: ["python", "-m", "streamlit", "run", "dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
