name: Release Desktop App (Windows + macOS)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-latest ]
        python-version: [ "3.11" ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install pyinstaller

      - name: Build app (PyInstaller)
        shell: bash
        run: |
          python scripts/build_desktop_app.py


      - name: Sign Windows (optional)
        if: ${{ runner.os == 'Windows' && secrets.WIN_SIGN_PFX_B64 != '' && secrets.WIN_SIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        env:
          WIN_SIGN_PFX_B64: ${{ secrets.WIN_SIGN_PFX_B64 }}
          WIN_SIGN_PFX_PASSWORD: ${{ secrets.WIN_SIGN_PFX_PASSWORD }}
          WIN_SIGN_TIMESTAMP_URL: ${{ secrets.WIN_SIGN_TIMESTAMP_URL }}
        run: |
          pwsh -File scripts/ci/sign_windows.ps1 -DistDir dist -AppName CryptoBotPro

      - name: Sign macOS + Notarize (optional)
        if: ${{ runner.os == 'macOS' && secrets.MAC_SIGN_P12_B64 != '' && secrets.MAC_SIGN_P12_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        shell: bash
        env:
          MAC_SIGN_P12_B64: ${{ secrets.MAC_SIGN_P12_B64 }}
          MAC_SIGN_P12_PASSWORD: ${{ secrets.MAC_SIGN_P12_PASSWORD }}
          MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          bash scripts/ci/sign_macos.sh dist CryptoBotPro

      - name: Package dist output (zip)
        shell: bash
        run: |
          python scripts/ci/package_dist.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoBotPro-${{ matrix.os }}
          path: dist_artifacts/*.zip
          if-no-files-found: error

  release:
    needs: [ build ]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          ls -R artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/dist_artifacts/*.zip
          generate_release_notes: true
