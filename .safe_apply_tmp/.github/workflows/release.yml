name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller
      - name: Validate
        run: python scripts\validate.py
      - name: Build app (PyInstaller)
        run: powershell -ExecutionPolicy Bypass -File packaging\pyinstaller\build_windows.ps1
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoBotPro-windows-dist
          path: dist/CryptoBotPro/**

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install pyinstaller
      - name: Validate
        run: python3 scripts/validate.py
      - name: Build app + DMG
        run: bash packaging/macos/build_app_and_dmg.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoBotPro-macos-dmg
          path: dist_dmg/CryptoBotPro.dmg
