name: CI - Signing (Windows) + Notarization (macOS)

on:
  workflow_dispatch:

jobs:
  windows_sign_pyinstaller:
    name: Windows - Build PyInstaller + Sign (optional)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f requirements/base.txt ]; then
            python -m pip install -r requirements/base.txt
          fi
          python -m pip install -r requirements/desktop.txt

      - name: Build PyInstaller wrapper
        shell: bash
        run: |
          python scripts/release_checklist.py --sync-requires --pyinstaller

      - name: Sign dist/ with signtool (PFX base64)
        if: ${{ secrets.WIN_CERTIFICATE_BASE64 != '' && secrets.WIN_CERT_PASSWORD != '' && (secrets.WIN_CERT_SHA1 != '' || secrets.WIN_CERT_NAME != '') }}
        uses: skymatic/code-sign-action@v3.0.1
        with:
          certificate: ${{ secrets.WIN_CERTIFICATE_BASE64 }}
          password: ${{ secrets.WIN_CERT_PASSWORD }}
          certificatesha1: ${{ secrets.WIN_CERT_SHA1 }}
          certificatename: ${{ secrets.WIN_CERT_NAME }}
          description: "CryptoBotPro"
          timestampUrl: "http://timestamp.digicert.com"
          folder: "dist"
          recursive: true

      - name: Verify signatures (signtool verify)
        if: ${{ secrets.WIN_CERTIFICATE_BASE64 != '' && secrets.WIN_CERT_PASSWORD != '' && (secrets.WIN_CERT_SHA1 != '' || secrets.WIN_CERT_NAME != '') }}
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -Path "dist" -Recurse -File | Where-Object { $_.Name.ToLower().EndsWith(".exe") -or $_.Name.ToLower().EndsWith(".msi") }
          if (-not $files) { throw "No .exe/.msi found under dist/ to verify" }
          foreach ($f in $files) {
            Write-Host "Verifying: $($f.FullName)"
            signtool verify /pa /v "$($f.FullName)"
          }
          Write-Host "All signatures verified."

      - name: Write FINAL release manifest (post-sign)
        shell: bash
        run: |
          # No bumps, no packaging; just hash manifest of final bits in dist/build/etc
          python scripts/release_checklist.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CryptoBotPro-Windows-Signed
          path: |
            dist/**
            releases/release_manifest_*.json
          if-no-files-found: error

  macos_codesign_and_notarize_briefcase:
    name: macOS - Briefcase Package + CodeSign + Notarize (optional)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Briefcase + sync requires
        shell: bash
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -r requirements/briefcase.txt
          python scripts/sync_briefcase_requires.py

      - name: Briefcase create/build/package (DMG)
        shell: bash
        run: |
          briefcase create macOS
          briefcase build macOS
          briefcase package macOS

      - name: Import signing certificate (p12) into temporary keychain
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' && secrets.MAC_CERT_PASSWORD != '' && secrets.MAC_KEYCHAIN_PASSWORD != '' }}
        shell: bash
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD }}
        run: |
          bash packaging/signing/macos_ci_import_cert.sh \
            --p12-base64 "$MAC_CERT_P12_BASE64" \
            --p12-password "$MAC_CERT_PASSWORD" \
            --keychain-password "$MAC_KEYCHAIN_PASSWORD"

      - name: CodeSign .app bundles (hardened runtime)
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' && secrets.MAC_CERT_PASSWORD != '' && secrets.MAC_KEYCHAIN_PASSWORD != '' && secrets.MAC_SIGN_IDENTITY != '' }}
        shell: bash
        env:
          MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}
        run: |
          bash packaging/signing/macos_ci_codesign_apps.sh --identity "$MAC_SIGN_IDENTITY"

      - name: Create notarytool keychain profile
        if: ${{ secrets.MAC_APPLE_ID != '' && secrets.MAC_APP_PASSWORD != '' && secrets.MAC_TEAM_ID != '' }}
        shell: bash
        env:
          APPLE_ID: ${{ secrets.MAC_APPLE_ID }}
          APP_PASSWORD: ${{ secrets.MAC_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.MAC_TEAM_ID }}
        run: |
          bash packaging/signing/macos_ci_prepare_notary_profile.sh \
            --profile "NotaryProfile" \
            --apple-id "$APPLE_ID" \
            --password "$APP_PASSWORD" \
            --team-id "$TEAM_ID"

      - name: Notarize + staple DMG(s)
        if: ${{ secrets.MAC_APPLE_ID != '' && secrets.MAC_APP_PASSWORD != '' && secrets.MAC_TEAM_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          DMGS=$(ls dist/*.dmg 2>/dev/null || true)
          if [ -z "${DMGS}" ]; then
            DMGS=$(find build -name "*.dmg" -maxdepth 6 2>/dev/null || true)
          fi
          if [ -z "${DMGS}" ]; then
            echo "No DMG found to notarize."
            exit 2
          fi
          for f in $DMGS; do
            bash packaging/signing/macos_notarize_file.sh --file "$f" --profile "NotaryProfile"
          done

      - name: Verify stapler + spctl assess
        if: ${{ secrets.MAC_APPLE_ID != '' && secrets.MAC_APP_PASSWORD != '' && secrets.MAC_TEAM_ID != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "== Verify DMG stapler validate =="
          DMGS=$(ls dist/*.dmg 2>/dev/null || true)
          if [ -z "${DMGS}" ]; then
            DMGS=$(find build -name "*.dmg" -maxdepth 6 2>/dev/null || true)
          fi
          for f in $DMGS; do
            echo "stapler validate: $f"
            xcrun stapler validate -v "$f"
          done

          echo "== Verify .app Gatekeeper assessment (spctl) =="
          APPS=$( (ls dist/*.app 2>/dev/null || true) ; (find build -maxdepth 7 -name "*.app" -type d 2>/dev/null || true) )
          if [ -n "${APPS}" ]; then
            for app in $APPS; do
              echo "spctl assess: $app"
              spctl --assess --type execute --verbose=2 "$app"
            done
          else
            echo "No .app bundles found to assess (ok if only DMG produced)."
          fi

      - name: Write FINAL release manifest (post-notary)
        shell: bash
        run: |
          python scripts/release_checklist.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CryptoBotPro-macOS-CodeSigned-Notarized
          path: |
            dist/**
            build/**
            releases/release_manifest_*.json
          if-no-files-found: warn
