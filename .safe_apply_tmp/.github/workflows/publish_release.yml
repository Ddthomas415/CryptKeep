name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      WIN_CERT_PFX_B64: ${{ secrets.WIN_CERT_PFX_B64 }}
      WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
      WIN_TIMESTAMP_URL: ${{ secrets.WIN_TIMESTAMP_URL }}
      SIGNTOOL_PATH: ${{ secrets.SIGNTOOL_PATH }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Validate
        run: python scripts\validate.py

      - name: Build app (PyInstaller)
        run: powershell -ExecutionPolicy Bypass -File packaging\pyinstaller\build_windows.ps1

      - name: Sign EXE (optional)
        if: ${{ env.WIN_CERT_PFX_B64 != '' && env.WIN_CERT_PASSWORD != '' }}
        run: powershell -ExecutionPolicy Bypass -File scripts\ci\windows_sign.ps1

      - name: Install Inno Setup (for installer build)
        shell: pwsh
        run: |
          choco install innosetup -y

      - name: Build installer (Inno Setup)
        run: powershell -ExecutionPolicy Bypass -File packaging\inno\build_windows_installer.ps1

      - name: Rename installer to include tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $installer = Get-ChildItem -Path ".\dist_installer" -Filter "CryptoBotPro-Setup-*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) { throw "Installer not found in dist_installer" }
          $dst = "CryptoBotPro-$tag-windows-setup.exe"
          Copy-Item $installer.FullName $dst -Force
          Write-Host "Built $dst"

      - name: Zip Windows dist folder
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $out = "CryptoBotPro-$tag-windows-dist.zip"
          if (Test-Path $out) { Remove-Item $out -Force }
          Compress-Archive -Path "dist\CryptoBotPro\*" -DestinationPath $out
          Write-Host "Built $out"

      - name: Upload artifacts (windows)
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            CryptoBotPro-*-windows-dist.zip
            CryptoBotPro-*-windows-setup.exe

  build-macos:
    runs-on: macos-latest
    env:
      MAC_CERT_P12_B64: ${{ secrets.MAC_CERT_P12_B64 }}
      MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
      MAC_SIGN_IDENTITY: ${{ secrets.MAC_SIGN_IDENTITY }}

      MAC_NOTARY_KEY_P8_B64: ${{ secrets.MAC_NOTARY_KEY_P8_B64 }}
      MAC_NOTARY_KEY_ID: ${{ secrets.MAC_NOTARY_KEY_ID }}
      MAC_NOTARY_ISSUER: ${{ secrets.MAC_NOTARY_ISSUER }}

      MAC_APPLE_ID: ${{ secrets.MAC_APPLE_ID }}
      MAC_APPLE_PW: ${{ secrets.MAC_APPLE_PW }}
      MAC_TEAM_ID: ${{ secrets.MAC_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
          python3 -m pip install pyinstaller

      - name: Validate
        run: python3 scripts/validate.py

      - name: Build app + DMG
        run: bash packaging/macos/build_app_and_dmg.sh

      - name: Sign + notarize (optional)
        if: ${{ env.MAC_CERT_P12_B64 != '' && env.MAC_CERT_PASSWORD != '' && env.MAC_SIGN_IDENTITY != '' }}
        run: |
          chmod +x scripts/ci/macos_sign_notarize.sh
          bash scripts/ci/macos_sign_notarize.sh

      - name: Rename DMG to include tag
        run: |
          TAG="${{ github.ref_name }}"
          mkdir -p release_out
          cp "dist_dmg/CryptoBotPro.dmg" "release_out/CryptoBotPro-${TAG}-macos.dmg"

      - name: Upload artifacts (macos)
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: release_out/CryptoBotPro-*-macos.dmg

  publish:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Create GitHub Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release_assets/**/CryptoBotPro-*-windows-dist.zip
            release_assets/**/CryptoBotPro-*-windows-setup.exe
            release_assets/**/CryptoBotPro-*-macos.dmg
