x-default-env-file: &default-env-file
  - path: .env
    required: false
  - path: .env.example
    required: true

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trade_ai}
      POSTGRES_USER: ${POSTGRES_USER:-trade_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trade_ai}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trade_ai} -d ${POSTGRES_DB:-trade_ai}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  migrator:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file: *default-env-file
    command: ["/bin/sh", "-lc", "alembic upgrade head && python scripts/seed_assets.py && python scripts/seed_sources.py"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  audit_log:
    build:
      context: .
      dockerfile: services/audit_log/Dockerfile
    env_file: *default-env-file
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "${AUDIT_LOG_PORT:-8008}:8008"

  risk_stub:
    build:
      context: .
      dockerfile: services/risk_stub/Dockerfile
    env_file: *default-env-file
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      audit_log:
        condition: service_started
    ports:
      - "${RISK_STUB_PORT:-8007}:8007"

  execution_sim:
    build:
      context: .
      dockerfile: services/execution_sim/Dockerfile
    env_file: *default-env-file
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      market_data:
        condition: service_started
      risk_stub:
        condition: service_started
      audit_log:
        condition: service_started
    ports:
      - "${EXECUTION_SIM_PORT:-8009}:8009"

  parser_normalizer:
    build:
      context: .
      dockerfile: services/parser_normalizer/Dockerfile
    env_file: *default-env-file
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      audit_log:
        condition: service_started
    ports:
      - "${PARSER_NORMALIZER_PORT:-8005}:8005"

  memory:
    build:
      context: .
      dockerfile: services/memory/Dockerfile
    env_file: *default-env-file
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      migrator:
        condition: service_completed_successfully
      audit_log:
        condition: service_started
    ports:
      - "${MEMORY_PORT:-8006}:8006"

  market_data:
    build:
      context: .
      dockerfile: services/market_data/Dockerfile
    env_file: *default-env-file
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      audit_log:
        condition: service_started
    ports:
      - "${MARKET_DATA_PORT:-8002}:8002"

  news_ingestion:
    build:
      context: .
      dockerfile: services/news_ingestion/Dockerfile
    env_file: *default-env-file
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      parser_normalizer:
        condition: service_started
      audit_log:
        condition: service_started
    ports:
      - "${NEWS_INGESTION_PORT:-8003}:8003"

  archive_lookup:
    build:
      context: .
      dockerfile: services/archive_lookup/Dockerfile
    env_file: *default-env-file
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      parser_normalizer:
        condition: service_started
      audit_log:
        condition: service_started
    ports:
      - "${ARCHIVE_LOOKUP_PORT:-8004}:8004"

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    env_file: *default-env-file
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully
      market_data:
        condition: service_started
      news_ingestion:
        condition: service_started
      archive_lookup:
        condition: service_started
      memory:
        condition: service_started
      risk_stub:
        condition: service_started
      audit_log:
        condition: service_started
    ports:
      - "${ORCHESTRATOR_PORT:-8001}:8001"

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file: *default-env-file
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully
      orchestrator:
        condition: service_started
      execution_sim:
        condition: service_started
      audit_log:
        condition: service_started
    ports:
      - "${GATEWAY_PORT:-8000}:8000"

volumes:
  pg_data:
  qdrant_data:
